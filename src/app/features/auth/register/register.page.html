<ion-header>
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-back-button defaultHref="/players"></ion-back-button>
    </ion-buttons>

    <ion-title>Register</ion-title>

  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-input
      label="Email"
      type="email"
      [value]="email()"
      (ionInput)="email.set($any($event.target).value)">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      label="Contraseña"
      type="password"
      [value]="password()"
      (ionInput)="password.set($any($event.target).value)">
    </ion-input>
  </ion-item>

  <ion-button expand="block" (click)="register()">
    Registrarse
  </ion-button>

</ion-content>
